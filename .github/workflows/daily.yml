name: Daily Briefing

# GitHub 免费版 schedule 实测常态延迟 1~3 小时（见 06-09~06-11 触发记录），
# 故第一拍刻意提前、三拍间隔 50 分钟拉开，避开整点（整点队列最挤）。判重保证只出一集。
on:
  schedule:
    - cron: "33 21 * * *"   # UTC 21:33 = 北京 05:33（晨报第一拍，延迟 1.5h 落在 ~07:00）
    - cron: "23 22 * * *"   # UTC 22:23 = 北京 06:23（晨报兜底1）
    - cron: "13 23 * * *"   # UTC 23:13 = 北京 07:13（晨报兜底2）
    - cron: "33 8 * * *"    # UTC 08:33 = 北京 16:33（晚报第一拍，延迟 1.5h 落在 ~18:00）
    - cron: "23 9 * * *"    # UTC 09:23 = 北京 17:23（晚报兜底1）
    - cron: "13 10 * * *"   # UTC 10:13 = 北京 18:13（晚报兜底2）
  workflow_dispatch: {}   # 也支持在 Actions 页面手动触发

permissions:
  contents: write

concurrency:
  group: timelyup-publish      # 与按需专题任务共用，串行执行，避免同时推送冲突
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      # 定时触发时按「是哪条 cron」锁定早/晚报，而不是按实际触发时刻的小时数判断——
      # 否则晨报兜底若被 GitHub 拖过北京 12 点，会被误判成晚报提前生成，把真晚报判重挤掉。
      - name: Pin slot by triggering cron
        if: github.event_name == 'schedule'
        run: |
          case "${{ github.event.schedule }}" in
            "33 21 * * *"|"23 22 * * *"|"13 23 * * *") echo "FORCE_SLOT=am" >> "$GITHUB_ENV" ;;
            *) echo "FORCE_SLOT=pm" >> "$GITHUB_ENV" ;;
          esac

      - name: Generate episode
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          PAGES_BASE_URL: ${{ vars.PAGES_BASE_URL }}
          WORK_PROFILE: ${{ secrets.WORK_PROFILE }}   # 你的真实工作背景（保密，不进代码）
        run: python -m src.pipeline

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --staged --quiet || git commit -m "Daily briefing $(date -u +%Y-%m-%d)"
          git push
