name: On-demand Topic

# 手机/网页手动触发：填一个主题，生成一期「专题」讲解并加入播客
on:
  workflow_dispatch:
    inputs:
      topic:
        description: "想生成讲解的主题（例：SiC 在 EPS 逆变器中的应用 / 无传感器 FOC 最新进展）"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: timelyup-publish      # 与每日任务共用，串行执行，避免同时推送冲突
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate topic episode
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          PAGES_BASE_URL: ${{ vars.PAGES_BASE_URL }}
          WORK_PROFILE: ${{ secrets.WORK_PROFILE }}
          TOPIC: ${{ inputs.topic }}      # 经环境变量传入，避免命令注入
        run: python -m src.topic

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --staged --quiet || git commit -m "Topic: ${{ inputs.topic }}"
          git push
